<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinyinMe — Free Chinese Pinyin Annotation Tool</title>
    <meta name="description" content="Instantly annotate Chinese text with Pinyin tones. Free, fast, and easy to use — perfect for learners at any level.">
    <meta name="keywords" content="pinyin annotation, Chinese reader, learn Chinese, pinyin tool, Chinese text pinyin, hanzi pinyin, Chinese pronunciation">
    <link rel="canonical" href="https://www.pinyinme.com">
    <meta name="robots" content="index, follow">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.pinyinme.com">
    <meta property="og:title" content="PinyinMe — Free Chinese Pinyin Annotation Tool">
    <meta property="og:description" content="Instantly annotate Chinese text with Pinyin tones. Free, fast, and easy to use — perfect for learners at any level.">
    <meta property="og:site_name" content="PinyinMe">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://www.pinyinme.com">
    <meta name="twitter:title" content="PinyinMe — Free Chinese Pinyin Annotation Tool">
    <meta name="twitter:description" content="Instantly annotate Chinese text with Pinyin tones. Free, fast, and easy to use — perfect for learners at any level.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.2/dist/index.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PinyinMe",
      "url": "https://www.pinyinme.com",
      "description": "Instantly annotate Chinese text with Pinyin tones. Free, fast, and easy to use — perfect for learners at any level.",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Any",
      "inLanguage": "zh",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
    <style>
        :root {
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-full: 9999px;
            --transition: 0.2s ease;
        }

        [data-theme="dark"] {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-2: #242424;
            --border: #2e2e2e;
            --text: #f0f0f0;
            --text-muted: #888;
            --accent: #6c8eff;
            --accent-hover: #5a7bff;
            --accent-subtle: rgba(108, 142, 255, 0.12);
            --pinyin: #6c8eff;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface-2: #f0f0f2;
            --border: #e0e0e0;
            --text: #111;
            --text-muted: #888;
            --accent: #3a5ff0;
            --accent-hover: #2a4fe0;
            --accent-subtle: rgba(58, 95, 240, 0.08);
            --pinyin: #3a5ff0;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background-color var(--transition), color var(--transition);
        }

        /* Layout */
        .page {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 36px;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .logo .tagline {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Theme toggle */
        .theme-toggle {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: background var(--transition), color var(--transition), border-color var(--transition);
            font-size: 16px;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: var(--accent-subtle);
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: background var(--transition), border-color var(--transition);
        }

        /* Samples */
        .samples {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .samples-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sample-btn {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            padding: 5px 12px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: background var(--transition), border-color var(--transition), color var(--transition);
        }

        .sample-btn:hover {
            background: var(--accent-subtle);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Textarea */
        .input-wrap {
            position: relative;
            margin-bottom: 14px;
        }

        textarea {
            width: 100%;
            height: 110px;
            padding: 14px;
            font-size: 16px;
            font-family: inherit;
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            resize: vertical;
            outline: none;
            transition: border-color var(--transition), background var(--transition);
            line-height: 1.6;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .input-hint {
            position: absolute;
            bottom: 10px;
            right: 12px;
            font-size: 11px;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Annotate button */
        .annotate-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background var(--transition), transform 0.1s;
        }

        .annotate-btn:hover {
            background: var(--accent-hover);
        }

        .annotate-btn:active {
            transform: scale(0.99);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 22px 0;
        }

        /* Display options */
        .options-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .options-toggle-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .options-toggle-icon {
            font-size: 11px;
            color: var(--text-muted);
            transition: transform var(--transition);
        }

        .options-toggle-icon.open {
            transform: rotate(180deg);
        }

        .options-body {
            display: none;
            margin-top: 16px;
        }

        .options-body.open {
            display: block;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        @media (min-width: 480px) {
            .options-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .option-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .option-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stepper {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stepper-btn {
            width: 28px;
            height: 28px;
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition), border-color var(--transition);
            padding: 0;
        }

        .stepper-btn:hover {
            background: var(--accent-subtle);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Segmented control */
        .segmented {
            display: flex;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .segmented button {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background var(--transition), color var(--transition);
        }

        .segmented button.active {
            background: var(--accent);
            color: #fff;
        }

        .segmented button:not(.active):hover {
            background: var(--accent-subtle);
            color: var(--accent);
        }

        /* Output */
        .output-container {
            margin-top: 28px;
        }

        .output-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
        }

        .output-body {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            font-size: 24px;
            line-height: 2.2;
            box-shadow: var(--shadow);
            transition: background var(--transition), border-color var(--transition);
        }

        ruby {
            display: inline-flex;
            flex-direction: column-reverse;
            align-items: center;
            vertical-align: 0.5em;
        }

        ruby.pinyin-above {
            flex-direction: column;
        }

        rt {
            font-size: 0.5em;
            color: var(--pinyin);
            text-align: center;
            line-height: 1;
            margin: 0;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 48px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div class="logo">
                <h1>PinyinMe</h1>
                <span class="tagline">Chinese Pinyin Annotator</span>
            </div>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">🌙</button>
        </header>

        <div class="card">
            <div class="samples">
                <span class="samples-label">Try</span>
                <button class="sample-btn" onclick="setSample('我想学中文')">我想学中文</button>
                <button class="sample-btn" onclick="setSample('拼音帮助你发音汉字')">拼音帮助你发音汉字</button>
            </div>

            <div class="input-wrap">
                <textarea id="input" placeholder="Paste or type Chinese text here…"></textarea>
                <span class="input-hint">Shift + Enter to annotate</span>
            </div>

            <button class="annotate-btn" onclick="generateReadingAid()">Annotate with Pinyin</button>

            <div class="divider"></div>

            <div class="options-toggle" onclick="toggleOptions()" id="options-toggle">
                <span class="options-toggle-label">Display options</span>
                <span class="options-toggle-icon" id="options-icon">▼</span>
            </div>

            <div class="options-body" id="options-body">
                <div class="options-grid">
                    <div class="option-item">
                        <span class="option-label">Chinese size</span>
                        <div class="stepper">
                            <button class="stepper-btn" onclick="adjustSize('chinese', -2)">−</button>
                            <button class="stepper-btn" onclick="adjustSize('chinese', 2)">+</button>
                        </div>
                    </div>
                    <div class="option-item">
                        <span class="option-label">Pinyin size</span>
                        <div class="stepper">
                            <button class="stepper-btn" onclick="adjustSize('pinyin', -2)">−</button>
                            <button class="stepper-btn" onclick="adjustSize('pinyin', 2)">+</button>
                        </div>
                    </div>
                    <div class="option-item">
                        <span class="option-label">Spacing</span>
                        <div class="stepper">
                            <button class="stepper-btn" onclick="adjustSpacing(-2)">−</button>
                            <button class="stepper-btn" onclick="adjustSpacing(2)">+</button>
                        </div>
                    </div>
                    <div class="option-item">
                        <span class="option-label">Pinyin position</span>
                        <div class="segmented">
                            <button onclick="setPinyinPosition(true)" id="above-button">Above</button>
                            <button onclick="setPinyinPosition(false)" id="below-button" class="active">Below</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="output-container" id="output-section" style="display:none">
            <div class="output-label">Result</div>
            <div class="output-body" id="output-container"></div>
        </div>

        <footer>PinyinMe &mdash; free tool for Chinese learners</footer>
    </div>

    <script>
        let chineseSize = 24;
        let pinyinSize = 12;
        let characterSpacing = 0;
        let pinyinAbove = false;

        // Theme
        const html = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');

        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const savedTheme = localStorage.getItem('theme') || (prefersDark ? 'dark' : 'light');
        setTheme(savedTheme);

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            themeBtn.textContent = theme === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('theme', theme);
        }

        themeBtn.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        // Options toggle
        function toggleOptions() {
            const body = document.getElementById('options-body');
            const icon = document.getElementById('options-icon');
            const open = body.classList.toggle('open');
            icon.classList.toggle('open', open);
        }

        function setSample(text) {
            document.getElementById('input').value = text;
            generateReadingAid();
        }

        function generateReadingAid() {
            const input = document.getElementById('input').value;
            if (!input.trim()) return;

            const output = document.getElementById('output-container');
            const section = document.getElementById('output-section');

            const pinyinText = pinyinPro.pinyin(input, { toneType: 'symbol', type: 'array' });

            let result = '';
            for (let i = 0; i < input.length; i++) {
                if (/[\u4e00-\u9fa5]/.test(input[i])) {
                    result += `<ruby class="${pinyinAbove ? 'pinyin-above' : ''}">${input[i]}<rt>${pinyinText[i]}</rt></ruby>`;
                } else {
                    result += input[i];
                }
            }

            output.innerHTML = result;
            section.style.display = 'block';
            updateStyles();
        }

        function updateStyles() {
            let style = document.getElementById('dynamic-style');
            if (!style) {
                style = document.createElement('style');
                style.id = 'dynamic-style';
                document.head.appendChild(style);
            }
            style.textContent = `
                #output-container { font-size: ${chineseSize}px; }
                #output-container ruby { margin-right: ${characterSpacing}px; }
                #output-container rt { font-size: ${pinyinSize / chineseSize}em; }
            `;
        }

        function adjustSize(type, change) {
            if (type === 'chinese') {
                chineseSize = Math.max(8, Math.min(72, chineseSize + change));
            } else if (type === 'pinyin') {
                pinyinSize = Math.max(8, Math.min(36, pinyinSize + change));
            }
            updateStyles();
        }

        function adjustSpacing(change) {
            characterSpacing = Math.max(0, Math.min(50, characterSpacing + change));
            updateStyles();
        }

        function setPinyinPosition(above) {
            pinyinAbove = above;
            document.getElementById('above-button').classList.toggle('active', above);
            document.getElementById('below-button').classList.toggle('active', !above);
            generateReadingAid();
        }

        updateStyles();

        document.getElementById('input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.shiftKey) {
                e.preventDefault();
                generateReadingAid();
            }
        });
    </script>
</body>
</html>
